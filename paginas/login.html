<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Nubis Financeiro</title>

    <link rel="stylesheet" href="./../css/style.css">
    <link rel="stylesheet" href="./../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.userway.org/widget.js" data-account="NwPL1sk2ks"></script>
    <link rel="shortcut icon" href="./../imagens/Nubis.png" type="image/x-icon">
</head>

<body>

    <main class="login-pagina">

        <section class="login-hero">

            <header class="login-header">
                <div class="login-estrelas">
                    <img src="./../icones/Star 3.svg">
                    <img src="./../icones/Star 4.svg">
                    <img src="./../icones/Star 3.svg">
                    <img src="./../icones/Star 4.svg">
                </div>

                <img src="./../imagens/logoNubis.png" alt="Logo completa" class="login-logo">
            </header>

            <div class="login-conteudo">
                <h1 class="login-titulo">Seu planejamento continua aqui</h1>

                <p class="login-texto">
                    Acesse sua conta e siga acompanhando seus objetivos financeiros.
                </p>
            </div>

            <p class="login-copyright">
                © 2026 Nubis™. Todos os direitos reservados.
            </p>

        </section>


        <section class="login-painel">

            <header class="painel-header">
                <a href="./../index.html"><i class="voltar-botao fa-solid fa-arrow-left"></i></a>

                <img src="./../imagens/Nubis.png" alt="Logo" class="painel-logo">
            </header>

            <form class="login-form" id="loginForm">

                <div class="form-cabecalho">
                    <h2 class="form-titulo">Bem-vindo(a) de volta!</h2>

                    <p class="form-subtitulo">
                        Sentimos sua falta. Entre com suas credenciais.
                    </p>
                </div>

                <div class="form-formulario">
                    <div class="form-campo">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="Insira seu e-mail">
                    </div>

                    <div class="form-campo" style="position: relative;">
                        <label for="senha">Senha</label>
                        
                        <input type="password" name="senha" id="senha" placeholder="Insira sua senha">
                        <span class="olho" id="ativarSenha"><i class="fa-solid fa-eye"></i></span>
                    </div>
                    <!-- <i class="fa-solid fa-eye-slash"></i> -->
                    <div id="erro" class="erro-msg"></div>

                    <a href="#" class="esqueci-senha">
                        Esqueceu sua senha?
                    </a>

                </div>

                <div class="form-conta">
                    <button type="submit" class="login-botao">
                        Entrar
                    </button>

                    <p class="cadastrar-texto">
                        Não possui uma conta?
                        <a href="#" class="signup-link">Crie uma agora.</a>
                    </p>
                </div>

            </form>

        </section>


    </main>
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    <script src="./../js/login.js"></script>
</body>

</html>
