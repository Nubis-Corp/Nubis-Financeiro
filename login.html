<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Nubis Financeiro</title>

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./login.css">
</head>

<body>

<main class="login-pagina">

    <section class="login-hero">

        <header class="hero-header">
            <div class="hero-estrelas">
                <i></i>
                <i></i>
                <i></i>
                <i></i>
            </div>

            <img src="./imagens/logoNubis.png" alt="Logo completa" class="hero-logo">
        </header>

        <div class="hero-conteudo">
            <h1 class="hero-titulo">Seu planejamento continua aqui</h1>

            <p class="hero-texto">
                Acesse sua conta e siga acompanhando seus objetivos financeiros.
            </p>
        </div>

        <p class="hero-copyright">
            © 2026 Nubis™. Todos os direitos reservados.
        </p>

    </section>


    <section class="login-painel">

        <header class="painel-header">
            <i class="voltar-botao"></i>

            <img src="" alt="Logo" class="painel-logo">
        </header>

        <form class="login-form" action="">

            <h2 class="form-titulo">Bem-vindo(a) de volta!</h2>

            <p class="form-subtitulo">
                Sentimos sua falta. Entre com suas credenciais.
            </p>

            <div class="form-campo">
                <label for="email">E-mail</label>
                <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="Insira seu e-mail"
                >
            </div>

            <div class="form-campo">
                <label for="senha">Senha</label>
                <input
                    type="password"
                    name="senha"
                    id="senha"
                    placeholder="Insira sua senha"
                >
            </div>

            <a href="#" class="esqueci-senha">
                Esqueceu sua senha?
            </a>

            <button type="submit" class="login-botao">
                Entrar
            </button>

            <p class="cadastrar-texto">
                Não possui uma conta?
                <a href="#" class="signup-link">Crie uma agora.</a>
            </p>

        </form>

    </section>

</main>

</body>
</html>
